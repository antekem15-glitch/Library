<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <script src="myscript.js" defer></script>
   <link rel="stylesheet" href="style.css">
 

</head>
<body>

    <section>
        <div class="header">
            <div></div>
        <h1>My Library</h1>
        <button onclick=showAddDialog() id="addButton">Add Book</button>
        </div>
        
    </section>

    <section class="main">
        <div class="bookCard">
            <h2>Title: Whatever</h2>
            <p> Author: Whoever</p>
            <p> Pages: Whatever</p>
            
            <div class="cardButtons">
            <div class="check">
                <input type="checkbox" id="status" name="status">
                <label for="status" id="statusText">Not Read</label>
            </div>
                <button type="button" class="rmvButton" onclick=removeCard()>Remove</button>
            </div>

        </div>
        <dialog id="addBooks">
            <div class="wrapper">
            <h3> Add Information Please</h2>
            <form>
                <label for="title"> Title</label>
                <input type="text" id="title" placeholder="Book Name">
                
                <label for="author"> Author</label>
                <input type="text" id="author" placeholder="Author Name">
                
                <label for="pages"> Pages</label>
               <input type="number" id="pages" placeholder="Pages">
                <button type="submit" id="dialogButton">Add</button>

                <button type="button" onclick=closeAddDialog() id="closeButton">Close</button>
                </div>
            </form>




        </dialog>
        
    </section>

    
</body>
</html>
