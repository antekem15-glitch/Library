<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <script src="myscript.js" defer></script>
   <link rel="stylesheet" href="style.css">
 

</head>
<body>

    <section>
        <div class="header">
            <div></div>
        <h1>My Library</h1>
        <button onclick=showAddDialog() id="addButton">Add Book</button>
        </div>
        
    </section>

    <section class="main">
      

        </div>
        <dialog id="addBooks">
            <div class="wrapper">
            <h3> Add Information Please</h2>
            <form>
                <div class="dialogTitle">
                <label for="title"> Title</label>
                <input type="text" id="title" placeholder="Book Name">
                <span class="error" aria-live= "polite" id="errorTitle"></span>
               </div>
                <div class="dialogAuthor">
                <label for="author"> Author</label>
                <input type="text" id="author" placeholder="Author Name">
                <span class="error" aria-live= "polite" id="errorAuthor"></span>
                </div>
                <label for="pages"> Pages</label>
               <input type="text" id="pages" placeholder="Pages" >
               <span class="error" aria-live= "polite" id="errorPages"></span>
                <button type="submit" id="dialogButton">Add</button>

                <button type="button" onclick=closeAddDialog() id="closeButton">Close</button>
                </div>
            </form>




        </dialog>
        
    </section>

    
</body>
</html>
